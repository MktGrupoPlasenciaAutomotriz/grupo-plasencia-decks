name: Deploy decks-plasencia Worker

# Deploy automático del Worker `decks-plasencia` (con Cloudflare Access) en cada push a main.
# Reemplaza el deploy manual desde el Mac de Chucho. CI/CD limpio.
#
# Requiere secret CLOUDFLARE_API_TOKEN con scope Workers Scripts:Edit + Workers Routes:Edit
# en este repo (Settings → Secrets and variables → Actions).
#
# El Worker sirve env.ASSETS.fetch(request) — bundle estático con los HTML del repo.
# La policy Cloudflare Access (atada al hostname) sobrevive al redeploy.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CLAUDE-docs-workflow.md'
      - 'sync.sh'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID:        ${{ secrets.CF_ACCOUNT_ID }}
        run: wrangler deploy

      - name: Reporte
        run: |
          echo "✅ Worker decks-plasencia deployed from main"
          echo "URL: https://decks-plasencia.grupo-plasencia-automotriz.workers.dev"
