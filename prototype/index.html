<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plasencia Marketplace · La experiencia ideal</title>
<meta name="description" content="El marketplace de Grupo Plasencia: 12 concesionarias, 14 marcas, en un solo lugar. Compra, financia, arrienda y mantén tu auto con el respaldo de 75 años.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1E2740;--navy-d:#0F1A2E;--slate:#2D3748;
  --red:#C8102E;--red-d:#A50D25;--gold:#ECC94B;--gold-d:#B7791F;
  --blue:#4299E1;--blue-d:#2B6CB0;--green:#48BB78;--green-d:#276749;--amber:#D69E2E;
  --n50:#F7FAFC;--n100:#EDF2F7;--n200:#E2E8F0;--n300:#CBD5E0;--n400:#A0AEC0;
  --n500:#718096;--n600:#4A5568;--n700:#2D3748;--n800:#1A202C;--n900:#171923;
  --disp:'Montserrat',sans-serif;--body:'Inter',system-ui,sans-serif;
  --sh-sm:0 1px 3px rgba(15,26,46,.08);--sh-md:0 4px 12px rgba(15,26,46,.08),0 2px 4px rgba(15,26,46,.06);
  --sh-lg:0 12px 32px rgba(15,26,46,.12);--sh-xl:0 24px 56px rgba(15,26,46,.20);
  --ease:cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--n100);color:var(--n800);-webkit-font-smoothing:antialiased;line-height:1.5}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
h1,h2,h3,h4{font-family:var(--disp);letter-spacing:-.02em}
.tnum{font-variant-numeric:tabular-nums}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--n300);border-radius:99px}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .5s var(--ease) both}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.pulse{animation:pulse 2s infinite}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* HEADER */
.hdr{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--n200)}
.hdr-in{max-width:1280px;margin:0 auto;padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:32px;width:auto}
.logo .tag{font-family:var(--disp);font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;background:var(--red);color:#fff;padding:3px 7px;border-radius:5px}
.nav{display:flex;align-items:center;gap:2px}
.nav a{font-family:var(--disp);font-size:13px;font-weight:600;color:var(--n700);padding:9px 14px;border-radius:8px;transition:.2s}
.nav a:hover{background:var(--n100);color:var(--navy)}
.nav a.on{color:var(--red);background:rgba(200,16,46,.06)}
.hdr-right{display:flex;align-items:center;gap:10px}
.acct,.signin{font-family:var(--disp);font-size:13px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:10px;transition:.2s;cursor:pointer}
.acct{border:1px solid var(--n200)}
.acct:hover,.signin:hover{border-color:var(--navy);background:var(--n50)}
.acct .av{width:26px;height:26px;border-radius:99px;background:var(--navy);color:var(--gold);font-family:var(--disp);font-weight:900;font-size:12px;display:flex;align-items:center;justify-content:center}
.acct .badge{background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:18px;height:18px;padding:0 5px;border-radius:99px;display:inline-flex;align-items:center;justify-content:center}
@media(max-width:860px){.nav{display:none}}

/* BUTTONS */
.btn{font-family:var(--disp);font-weight:700;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.2s;letter-spacing:-.01em;white-space:nowrap}
.btn:active{transform:scale(.98)}.btn:focus-visible{outline:3px solid rgba(66,153,225,.4);outline-offset:2px}
.btn-sm{font-size:13px;padding:8px 14px}.btn-md{font-size:14px;padding:11px 20px}.btn-lg{font-size:15px;padding:14px 26px}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--slate)}
.btn-conv{background:var(--red);color:#fff;box-shadow:0 6px 16px rgba(200,16,46,.25)}.btn-conv:hover{background:var(--red-d)}
.btn-out{border:1px solid var(--n300);color:var(--navy);background:#fff}.btn-out:hover{border-color:var(--navy);background:var(--n50)}
.btn-ghost{color:var(--navy)}.btn-ghost:hover{background:var(--n100)}
.btn-full{width:100%}.btn[disabled]{opacity:.5;cursor:not-allowed}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:var(--gold-d);color:#fff}

/* GENERIC */
.wrap{max-width:1280px;margin:0 auto;padding:0 24px}
.eyebrow{font-family:var(--disp);font-size:11px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--red)}
.eyebrow.gold{color:var(--gold)}
.bp{font-family:var(--disp);font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:99px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.bp-gold{background:rgba(236,201,75,.2);color:var(--gold-d)}
.bp-green{background:rgba(72,187,120,.15);color:var(--green-d)}
.bp-navy{background:rgba(30,39,64,.08);color:var(--navy)}
.bp-red{background:rgba(200,16,46,.1);color:var(--red)}
.bp-amber{background:rgba(214,158,46,.15);color:var(--amber)}

/* HERO con imagen real */
.hero{position:relative;overflow:hidden;background:var(--navy-d);color:#fff;min-height:620px;display:flex;align-items:center}
.hero .bg{position:absolute;inset:0;background-image:url(hero-showroom.jpg);background-size:cover;background-position:center;opacity:.45;filter:saturate(1.1)}
.hero .grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,26,46,.85) 0%,rgba(15,26,46,.55) 40%,rgba(15,26,46,.9) 100%),radial-gradient(ellipse 60% 80% at 100% 0%,rgba(236,201,75,.18),transparent 60%)}
.hero-in{position:relative;max-width:1280px;margin:0 auto;padding:96px 24px 100px;width:100%}
.hero h1{font-size:clamp(36px,6.5vw,72px);font-weight:900;line-height:1.02;max-width:920px;text-shadow:0 4px 20px rgba(0,0,0,.3)}
.hero h1 .y{color:var(--gold)}
.hero p.sub{font-size:clamp(15px,2vw,18px);color:rgba(255,255,255,.85);margin-top:22px;max-width:640px;line-height:1.6}
.search-shell{margin-top:36px;background:#fff;border-radius:18px;padding:8px;display:flex;gap:8px;max-width:680px;box-shadow:0 24px 64px rgba(0,0,0,.4)}
.search-shell input{flex:1;border:none;outline:none;padding:14px 18px;font-size:15px;color:var(--navy);border-radius:12px;font-weight:500}
.trust-line{display:flex;flex-wrap:wrap;gap:8px 28px;margin-top:32px}
.trust-line span{font-size:13px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:7px}
.trust-line b{color:var(--gold);font-size:15px}
.hero-stats{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-top:54px;background:rgba(255,255,255,.1);border-radius:14px;overflow:hidden;max-width:740px}
.hero-stats .stat{padding:18px 22px;background:rgba(15,26,46,.6);backdrop-filter:blur(8px)}
.hero-stats .v{font-family:var(--disp);font-weight:900;font-size:26px;color:var(--gold)}
.hero-stats .l{font-size:11px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:1px;margin-top:2px;font-family:var(--disp);font-weight:700}
@media(max-width:680px){.hero-stats{grid-template-columns:1fr 1fr}}

/* MARCAS STRIP */
.marcas{background:#fff;border-bottom:1px solid var(--n200)}
.marcas-in{max-width:1280px;margin:0 auto;padding:24px;display:flex;flex-wrap:wrap;gap:6px 28px;align-items:center;justify-content:center}
.marcas .lbl{font-family:var(--disp);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--n400)}
.marcas b{font-family:var(--disp);font-weight:800;color:var(--n600);font-size:14px;transition:.2s;cursor:pointer}
.marcas b:hover{color:var(--navy)}

/* SECTIONS */
.sec{padding:80px 0}
.sec h2{font-size:clamp(26px,4vw,40px);font-weight:800;color:var(--navy);max-width:720px;line-height:1.15}
.sec .lede{font-size:16px;color:var(--n600);margin-top:12px;max-width:640px;line-height:1.6}

/* SOLUCIONES */
.sol-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:40px}
@media(max-width:880px){.sol-grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.sol-grid{grid-template-columns:1fr}}
.sol{background:#fff;border:1px solid var(--n200);border-radius:18px;padding:28px;transition:.2s;position:relative;overflow:hidden}
.sol::before{content:"";position:absolute;left:0;top:0;width:0;height:3px;background:var(--red);transition:.3s}
.sol:hover::before{width:100%}
.sol:hover{box-shadow:var(--sh-lg);border-color:var(--n300);transform:translateY(-3px)}
.sol .ic{font-size:32px;display:inline-block;background:linear-gradient(135deg,var(--n50),var(--n100));width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.sol h3{font-size:18px;font-weight:700;color:var(--navy);margin-top:16px}
.sol p{font-size:13px;color:var(--n600);margin-top:6px;line-height:1.55}

/* VEHICLE GRID + CARD */
.vgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;margin-top:36px}
@media(max-width:1100px){.vgrid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:820px){.vgrid{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.vgrid{grid-template-columns:1fr}}
.vcard{background:#fff;border:1px solid var(--n200);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;transition:.25s;cursor:pointer}
.vcard:hover{box-shadow:var(--sh-lg);transform:translateY(-3px);border-color:var(--n300)}
.vcard .ph{position:relative;aspect-ratio:16/10;background:linear-gradient(180deg,var(--n100),var(--n200));overflow:hidden}
.vcard .ph img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease)}
.vcard:hover .ph img{transform:scale(1.06)}
.vcard .ovl{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:6px;align-items:flex-start}
.vcard .like{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:99px;background:rgba(255,255,255,.9);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s}
.vcard .like:hover{background:#fff;transform:scale(1.1)}
.vcard .like.on{background:var(--red);color:#fff}
.vcard .body{padding:18px;display:flex;flex-direction:column;flex:1}
.vcard .mk{font-family:var(--disp);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--n600);display:flex;gap:6px;align-items:center}
.vcard .mk .yr{color:var(--n400);font-weight:600}
.vcard h3{font-size:17px;font-weight:700;color:var(--navy);margin-top:2px;line-height:1.25}
.vcard .specs{display:flex;flex-wrap:wrap;gap:4px 10px;margin-top:10px;font-size:11px;color:var(--n500)}
.vcard .seller{display:flex;align-items:center;gap:8px;margin-top:14px;padding:10px;background:var(--n50);border-radius:10px;border:1px solid var(--n100)}
.vcard .seller-av{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--navy),var(--slate));color:var(--gold);font-family:var(--disp);font-weight:900;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vcard .seller-info{flex:1;min-width:0}
.vcard .seller-name{font-family:var(--disp);font-size:11px;font-weight:700;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vcard .seller-meta{font-size:10px;color:var(--n500);display:flex;align-items:center;gap:4px}
.vcard .star{color:var(--gold-d)}
.vcard .foot{margin-top:14px;display:flex;align-items:flex-end;justify-content:space-between}
.vcard .price{font-family:var(--disp);font-weight:800;font-size:21px;color:var(--navy)}
.vcard .mens{font-size:11px;color:var(--n500)}.vcard .mens b{color:var(--green-d);font-weight:700}

/* CONCESIONARIAS BANNER + GRID */
.dealers-hero{position:relative;border-radius:24px;overflow:hidden;color:#fff;padding:48px 40px;margin-top:36px;min-height:280px;display:flex;flex-direction:column;justify-content:flex-end}
.dealers-hero .bg{position:absolute;inset:0;background:url(banner-dealerships.jpg) center/cover;opacity:.7}
.dealers-hero .grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,26,46,.4),rgba(15,26,46,.92))}
.dealers-hero .ctn{position:relative}
.dealers-hero h2{color:#fff;font-size:clamp(24px,3.5vw,34px);max-width:600px}
.dealers-hero p{margin-top:8px;color:rgba(255,255,255,.85);max-width:540px;font-size:14px}
.dealer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px}
@media(max-width:880px){.dealer-grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.dealer-grid{grid-template-columns:1fr}}
.dealer{background:#fff;border:1px solid var(--n200);border-radius:16px;padding:20px;transition:.2s;cursor:pointer;display:flex;gap:14px;align-items:flex-start}
.dealer:hover{box-shadow:var(--sh-md);border-color:var(--navy);transform:translateY(-2px)}
.dealer .ic{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--navy),var(--slate));color:var(--gold);font-family:var(--disp);font-weight:900;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dealer-info{flex:1;min-width:0}
.dealer-info h4{font-size:15px;color:var(--navy)}
.dealer-info .meta{font-size:11px;color:var(--n500);margin-top:2px}
.dealer-info .rating{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px}
.dealer-info .rating b{color:var(--navy);font-family:var(--disp);font-weight:700}
.dealer-info .rating .star{color:var(--gold-d)}
.dealer-info .rating .reviews{color:var(--n500)}
.dealer-info .autos{font-size:11px;color:var(--n600);margin-top:6px;font-weight:600}

/* CICLO */
.ciclo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;margin-top:40px}
@media(max-width:880px){.ciclo-grid{grid-template-columns:repeat(2,1fr)}}
.ciclo div{position:relative}
.ciclo .n{font-family:var(--disp);font-weight:900;font-size:46px;color:var(--n200);line-height:1;letter-spacing:-2px}
.ciclo h3{font-size:18px;color:var(--navy);margin-top:4px}
.ciclo p{font-size:13px;color:var(--n600);margin-top:6px;line-height:1.55}

/* BANNER PROMO */
.promo{margin-top:80px;border-radius:24px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;background:var(--navy-d);color:#fff;min-height:340px}
@media(max-width:760px){.promo{grid-template-columns:1fr}}
.promo .img{background:url(banner-family.jpg) center/cover}
.promo .ctn{padding:48px;display:flex;flex-direction:column;justify-content:center}
.promo h2{color:#fff;font-size:clamp(22px,3vw,32px);max-width:420px}
.promo p{color:rgba(255,255,255,.85);margin-top:12px;font-size:15px;max-width:420px;line-height:1.55}

/* FILTERS */
.filters{position:sticky;top:68px;z-index:30;background:rgba(237,242,247,.95);backdrop-filter:blur(8px);padding:18px 0;border-bottom:1px solid var(--n200)}
.filters-in{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.filters input,.filters select{font-family:var(--disp);font-size:13px;font-weight:600;border:1px solid var(--n300);background:#fff;border-radius:99px;padding:10px 16px;outline:none;color:var(--navy);cursor:pointer;transition:.15s}
.filters input{cursor:text;min-width:200px}
.filters input:focus,.filters select:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,39,64,.1)}
.filters .clear{font-family:var(--disp);font-size:12px;font-weight:700;color:var(--red);padding:8px 12px}
.filters .count{margin-left:auto;font-size:13px;color:var(--n500);font-weight:500}

/* PDP */
.crumb{font-size:12px;color:var(--n500);display:flex;gap:8px;margin:24px 0}
.crumb a:hover{color:var(--navy)}
.pdp{display:grid;grid-template-columns:1.4fr 1fr;gap:36px;align-items:start}
@media(max-width:900px){.pdp{grid-template-columns:1fr}}
.gal-main{aspect-ratio:16/10;border-radius:20px;overflow:hidden;background:var(--n100);box-shadow:var(--sh-md)}
.gal-main img{width:100%;height:100%;object-fit:cover}
.gal-thumbs{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.gal-thumbs button{width:88px;height:60px;border-radius:10px;overflow:hidden;border:2px solid transparent;opacity:.6;transition:.2s;padding:0}
.gal-thumbs button.on{border-color:var(--navy);opacity:1}
.gal-thumbs button:hover{opacity:1}
.gal-thumbs img{width:100%;height:100%;object-fit:cover}
.trust-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:24px;background:#fff;border:1px solid var(--n200);border-radius:18px;padding:22px}
.trust-row .t{font-size:13px;color:var(--n600);display:flex;align-items:center;gap:10px}
.trust-row .t b{color:var(--green-d);font-size:16px}
/* Seller box en PDP */
.seller-box{margin-top:24px;background:#fff;border:1px solid var(--n200);border-radius:18px;padding:22px;display:flex;align-items:center;gap:16px}
.seller-box .av{width:64px;height:64px;border-radius:14px;background:linear-gradient(135deg,var(--navy),var(--slate));color:var(--gold);font-family:var(--disp);font-weight:900;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.seller-box .info h4{font-size:17px;color:var(--navy)}
.seller-box .info .meta{font-size:12px;color:var(--n500);margin-top:2px}
.seller-box .info .rating{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:13px}
.seller-box .info .rating .star{color:var(--gold-d)}
.seller-box .info .rating b{color:var(--navy);font-family:var(--disp)}
.seller-box .info .rating .rv{color:var(--n500)}
.seller-box a{margin-left:auto;flex-shrink:0}
/* Specs */
.specs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--n200);border:1px solid var(--n200);border-radius:18px;overflow:hidden;margin-top:24px}
@media(max-width:560px){.specs-grid{grid-template-columns:1fr 1fr}}
.specs-grid .c{background:#fff;padding:16px}
.specs-grid .k{font-family:var(--disp);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--n500)}
.specs-grid .v{font-size:14px;font-weight:600;color:var(--navy);margin-top:2px}
/* Cockpit */
.cockpit{background:#fff;border:1px solid var(--n200);border-radius:20px;padding:26px;box-shadow:var(--sh-md);position:sticky;top:88px}
.cockpit .mk{font-family:var(--disp);font-size:12px;font-weight:800;text-transform:uppercase;color:var(--n600);display:flex;gap:6px;align-items:center}
.cockpit h1{font-size:28px;font-weight:800;color:var(--navy);line-height:1.1;margin-top:2px}
.cockpit .v-ver{font-size:13px;color:var(--n500);margin-top:4px}
.cockpit .price{font-family:var(--disp);font-weight:900;font-size:34px;color:var(--navy);margin-top:14px;padding-bottom:16px;border-bottom:1px solid var(--n200)}
.modtabs{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:var(--n100);padding:4px;border-radius:12px;margin-top:18px}
.modtabs button{font-family:var(--disp);font-size:12px;font-weight:700;padding:10px;border-radius:9px;color:var(--n500);transition:.2s}
.modtabs button.on{background:#fff;color:var(--navy);box-shadow:var(--sh-sm)}
.calc{margin-top:18px}
.calc .row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.calc .row b{color:var(--navy)}
.calc input[type=range]{width:100%;accent-color:var(--red)}
.plazos{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}

<body>
<div id="app"><div class="loading">Cargando Plasencia Marketplace…</div></div>
<button class="plasi-btn" id="plasiBtn" onclick="Plasi.open()"><span class="av">P</span><span>Pregúntale a Plasi</span></button>

<script>
const $ = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>[...el.querySelectorAll(s)];
const mxn = n => new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0}).format(n||0);
const initials = s => (s||'').split(' ').filter(w=>/^[A-ZÁÉÍÓÚ]/.test(w[0]||'')).map(w=>w[0]).slice(0,2).join('').toUpperCase()||'P';
const FALLBACK='data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250"><rect width="400" height="250" fill="#E2E8F0"/><text x="50%" y="50%" font-family="sans-serif" font-size="14" fill="#A0AEC0" text-anchor="middle" dy=".3em">Plasencia · Foto próximamente</text></svg>');

const KEY='plasencia-mkt-v3';
let STATE = JSON.parse(localStorage.getItem(KEY) || 'null') || {customer:null, deals:[], pagos:[], servicios:[], favs:[], notifs:[]};
const save = ()=>localStorage.setItem(KEY, JSON.stringify(STATE));

const TASA=0.135;
const mensCredito=(p,e,n)=>{const cap=p*(1-e/100);const i=TASA/12;return i===0?cap/n:cap*i/(1-Math.pow(1+i,-n))};
const rentaLease=(p,n)=>{const f=n<=24?.032:n<=36?.026:.022;return p*f*1.16};
const folio=m=>{const d=new Date();const p=x=>String(x).padStart(2,'0');return `GP-${m.slice(0,3).toUpperCase()}-${String(d.getFullYear()%100)}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`};
const uid=p=>p+'-'+Math.random().toString(36).slice(2,8);

let CARS=[], MARCAS=[], SUCS=[];
const getSuc = id => SUCS.find(s=>s.id===id) || {nombre:'Plasencia',rating:4.8,reviews:0};

// ====== HEADER / FOOTER / NAV ======
function header(){
  const route=(location.hash||'#/').split('?')[0];
  const c=STATE.customer;
  const link=(h,l)=>`<a href="${h}" class="${route===h?'on':''}">${l}</a>`;
  return `<header class="hdr"><div class="hdr-in">
    <a href="#/" class="logo"><img src="logo-negro.png" alt="Grupo Plasencia"><span class="tag">Marketplace</span></a>
    <nav class="nav">${link('#/catalogo','Catálogo')}${link('#/concesionarias','Concesionarias')}<a href="#/catalogo?cond=nuevo">Nuevos</a><a href="#/catalogo?cond=seminuevo">Seminuevos</a><a href="#/catalogo?mod=lease">Autolease</a></nav>
    <div class="hdr-right">
      ${c?`<a href="#/cuenta" class="acct"><span class="av">${initials(c.nombre)}</span><span>${c.nombre.split(' ')[0]}</span>${STATE.deals.length?`<span class="badge">${STATE.deals.length}</span>`:''}</a>`
        :`<button class="signin" onclick="Auth.open()">Iniciar sesión</button><button class="btn btn-conv btn-md" onclick="Auth.open('signup')">Crear cuenta</button>`}
    </div>
  </div></header>`;
}
function footer(){return `<footer class="ftr"><div class="ftr-in"><div class="ftr-grid">
  <div class="ftr-logo"><img src="logo-blanco.png" alt="Grupo Plasencia"><p>El marketplace de Grupo Plasencia: 12 concesionarias del grupo, 14 marcas, y todo el ciclo de tu auto en un solo lugar.</p></div>
  <div><h4>Comprar</h4><ul><li>Autos nuevos</li><li>Seminuevos certificados</li><li>Comparar</li><li>Valuar mi auto</li></ul></div>
  <div><h4>Soluciones</h4><ul><li>Plasencia Crédito</li><li>GP Autolease</li><li>Plasencia Seguros</li><li>Postventa</li></ul></div>
  <div><h4>Grupo</h4><ul><li>75 años de historia</li><li>12 concesionarias</li><li>Trabaja con nosotros</li><li>Contacto</li></ul></div>
</div><div class="bottom"><span>© 2026 Grupo Plasencia Automotriz · Prototipo de producto</span><span style="color:var(--gold)">Marketplace · la experiencia ideal</span></div></div></footer>`;}

// ====== VEHICLE CARD (modelo marketplace: muestra vendedor) ======
function vcard(v){
  const mens=mensCredito(v.precio,20,60);
  const suc=getSuc(v.suc);
  const liked=STATE.favs.includes(v.id);
  return `<article class="vcard" onclick="go('#/auto/${v.id}')">
    <div class="ph">
      <img src="${v.fotos[0]}" alt="${v.marca} ${v.modelo}" loading="lazy" onerror="this.src='${FALLBACK}'">
      <div class="ovl">
        ${v.dest?'<span class="bp bp-gold">★ Destacado</span>':''}
        ${v.cond==='nuevo'?'<span class="bp bp-green">Nuevo · 0 km</span>':'<span class="bp bp-navy">Seminuevo · 167 pts</span>'}
      </div>
      <button class="like ${liked?'on':''}" onclick="event.stopPropagation();toggleFav('${v.id}',this)" title="Guardar">${liked?'♥':'♡'}</button>
    </div>
    <div class="body">
      <div class="mk">${v.marca}<span class="yr">· ${v.anio}</span></div>
      <h3>${v.modelo}</h3>
      <div class="specs"><span>${v.cond==='nuevo'?'0 km':v.km.toLocaleString('es-MX')+' km'}</span><span>·</span><span>${v.trans}</span><span>·</span><span>${v.fuel}</span></div>
      <div class="seller">
        <div class="seller-av">${initials(suc.nombre)}</div>
        <div class="seller-info">
          <div class="seller-name">${suc.nombre}</div>
          <div class="seller-meta"><span class="star">★</span>${suc.rating} · ${suc.reviews.toLocaleString('es-MX')} reseñas</div>
        </div>
      </div>
      <div class="foot">
        <div><div class="price tnum">${mxn(v.precio)}</div><div class="mens">o <b class="tnum">${mxn(mens)}</b>/mes</div></div>
      </div>
    </div>
  </article>`;
}

// ====== HOME ======
const SOLUC=[
  ['🚗','Comprar','Autos nuevos y seminuevos certificados de 14 marcas, en un solo catálogo cross-marca.'],
  ['💳','Financiar','Plasencia Crédito: pre-aprobación en línea en 2 minutos, sin afectar tu buró.'],
  ['🔑','Arrendar','GP Autolease: arrendamiento puro para personas y empresas. Renuevas cada 2-3 años.'],
  ['🛡️','Asegurar','Seguros y garantía extendida, integrados directamente a tu compra.'],
  ['🔧','Mantener','Postventa, servicio programado y refacciones agendados desde tu cuenta.'],
  ['♻️','Renovar','Tu auto actual se valúa en línea y aplica como enganche del siguiente.'],
];
const CICLO=[
  ['01','Descubre','Compara entre marcas por uso, no por logo. 12 concesionarias compiten por ti.'],
  ['02','Decide','Calcula crédito o arrendamiento. Valúa tu auto. Pre-aprueba sin afectar buró.'],
  ['03','Aparta','Reserva con $5,000 reembolsables. Paga el enganche en línea, sin filas.'],
  ['04','Vive','Servicios programados, refacciones y postventa desde tu cuenta única.'],
  ['05','Renueva','A los 5 años, recompra con tu historial. El ciclo se cierra dentro del grupo.'],
];

function viewHome(){
  const dest=CARS.filter(c=>c.dest).slice(0,4);
  const topDealers=SUCS.slice().sort((a,b)=>b.reviews-a.reviews).slice(0,6);
  return `
  <section class="hero">
    <div class="bg"></div><div class="grad"></div>
    <div class="hero-in fu">
      <div class="eyebrow gold">Grupo Plasencia · 75 años · 12 concesionarias · 14 marcas</div>
      <h1 style="margin-top:14px">Toda tu vida automotriz,<br><span class="y">en un solo lugar.</span></h1>
      <p class="sub">El marketplace donde las 12 concesionarias del grupo compiten por ti. Compra, financia, arrienda y mantén tu auto con el respaldo de 75 años.</p>
      <div class="search-shell">
        <input id="heroSearch" placeholder="Busca por marca, modelo o uso (ej. SUV familiar)…" onkeydown="if(event.key==='Enter')go('#/catalogo?q='+encodeURIComponent(this.value))">
        <button class="btn btn-conv btn-lg" onclick="go('#/catalogo')">Ver catálogo</button>
      </div>
      <div class="trust-line">
        <span><b>✓</b> Precio justo, sin sorpresas</span>
        <span><b>✓</b> 167 puntos de inspección</span>
        <span><b>✓</b> Apartado reembolsable</span>
        <span><b>✓</b> Crédito sin afectar buró</span>
      </div>
      <div class="hero-stats">

let FILT={q:'',cond:'todos',marca:'todas',tipo:'todas',max:99999999,shown:12};
function viewCatalogo(){
  const tipos=[...new Set(CARS.map(c=>c.tipo))];
  return `<div class="filters"><div class="filters-in">
    <input id="fq" placeholder="Buscar auto…" value="${FILT.q}" oninput="setF('q',this.value)">
    <select onchange="setF('cond',this.value)"><option value="todos">Condición</option><option value="nuevo" ${FILT.cond==='nuevo'?'selected':''}>Nuevos</option><option value="seminuevo" ${FILT.cond==='seminuevo'?'selected':''}>Seminuevos</option></select>
    <select onchange="setF('marca',this.value)"><option value="todas">Marca</option>${MARCAS.map(m=>`<option ${FILT.marca===m?'selected':''}>${m}</option>`).join('')}</select>
    <select onchange="setF('tipo',this.value)"><option value="todas">Tipo</option>${tipos.map(t=>`<option ${FILT.tipo===t?'selected':''}>${t}</option>`).join('')}</select>
    <select onchange="setF('max',+this.value)"><option value="99999999">Precio máx.</option><option value="350000">&lt; $350,000</option><option value="600000">&lt; $600,000</option><option value="900000">&lt; $900,000</option></select>
    <span class="count" id="fcount"></span>
  </div></div>
  <div class="wrap" style="padding:32px 24px 0">
    <div class="eyebrow">Catálogo cross-marca · 12 concesionarias</div>
    <h2 style="font-size:clamp(24px,3vw,34px);font-weight:800;color:var(--navy);margin-top:8px">Encuentra por uso, no por logo</h2>
  </div>
  <div class="wrap" style="padding-bottom:48px"><div id="vgrid" class="vgrid"></div><div id="loadmore" style="text-align:center;margin-top:40px"></div></div>`;
}
function applyFilters(){
  let r=CARS.filter(c=>{
    if(FILT.cond!=='todos'&&c.cond!==FILT.cond)return false;
    if(FILT.marca!=='todas'&&c.marca!==FILT.marca)return false;
    if(FILT.tipo!=='todas'&&c.tipo!==FILT.tipo)return false;
    if(c.precio>FILT.max)return false;
    if(FILT.q){const h=(c.marca+' '+c.modelo+' '+c.tipo).toLowerCase();if(!h.includes(FILT.q.toLowerCase()))return false}
    return true;
  });
  const g=$('#vgrid'),cnt=$('#fcount'),lm=$('#loadmore');
  if(cnt)cnt.textContent=r.length+' resultados';
  if(!g)return;
  if(r.length===0){g.innerHTML='';lm.innerHTML='<div class="empty"><div class="ic">🔍</div><p>Sin resultados con esos filtros.</p></div>';return}
  g.innerHTML=r.slice(0,FILT.shown).map(vcard).join('');
  lm.innerHTML=FILT.shown<r.length?`<button class="btn btn-out btn-lg" onclick="FILT.shown+=8;applyFilters()">Ver más vehículos (${r.length-FILT.shown} restantes)</button>`:'';
}
function setF(k,v){FILT[k]=v;FILT.shown=12;applyFilters()}
function toggleFav(id,btn){
  const i=STATE.favs.indexOf(id);
  if(i>=0)STATE.favs.splice(i,1);else STATE.favs.push(id);
  save();if(btn){btn.classList.toggle('on');btn.textContent=STATE.favs.includes(id)?'♥':'♡'}
}

    document.body.appendChild(p);
  },
  send(q){q=(q||'').trim();if(!q)return;this.msgs.push({f:'usr',t:q});this.renderMsgs();setTimeout(()=>{this.msgs.push({f:'bot',t:this.reply(q)});this.renderMsgs()},420)},
  renderMsgs(){const m=$('#pmsgs');if(!m)return;m.innerHTML=this.msgs.map(x=>`<div class="pmsg ${x.f}">${x.t}</div>`).join('');m.scrollTop=m.scrollHeight},
  reply(q){const t=q.toLowerCase();
    if(t.includes('familia')||t.includes('suv'))return 'Para familia te recomiendo un SUV: tenemos Mazda CX-5, Hyundai Tucson, Jeep Compass, GAC Emkoo y más. Todos cross-marca de las 12 concesionarias del grupo. ¿Quieres que filtre el catálogo por SUV?';
    if(t.includes('apart'))return 'Apartas cualquier auto con $5,000 reembolsables. Reserva la unidad, fija el precio y agenda tu cita. Si no continúas, devolvemos el depósito completo.';
    if(t.includes('crédito')||t.includes('credito')||t.includes('financ'))return 'Para el crédito Plasencia necesitas identificación, comprobante de domicilio e ingresos. Te pre-apruebas en línea sin afectar tu buró. Enganche típico 20%, plazos 12-60 meses, tasa 13.5% anual.';
    if(t.includes('arrend')||t.includes('lease'))return 'GP Autolease es arrendamiento puro: renta mensual fija sin enganche fuerte. Al final del plazo renuevas, devuelves o compras. Ideal para empresas (deducible) y para quien renueva cada 2-3 años.';
    if(t.includes('valuar')||t.includes('mi auto'))return 'Con gusto valúo tu auto actual para aplicar como enganche. ¿De qué marca, modelo y año es? (En el prototipo la valuación es estimada.)';
    if(t.includes('seminuevo')||t.includes('usado'))return 'Nuestros seminuevos pasan 167 puntos de inspección, con garantía por escrito y devolución de 7 días. Cada uno muestra su historial.';
    if(t.includes('concesion')||t.includes('vendedor'))return 'El grupo tiene 12 concesionarias: Mazda Bugambilias, López Mateos, Galerías, Santa Anita, Américas, Acueducto, Plasencia Centro, González Gallo, Hyundai Acueducto y Vallarta, Stellantis LCV y Jeep, y GAC Plasencia. Todas operan dentro del marketplace.';
    return 'Te puedo ayudar con: elegir auto, cotizar crédito o arrendamiento, el apartado, seminuevos certificados, agendar tu cita, o conocer las concesionarias del grupo. ¿Sobre cuál te cuento más?';
  }
};

// ====== ROUTER ======
function go(hash){location.hash=hash}
function updateHeader(){const h=$('.hdr');if(h)h.outerHTML=header()}
function render(){
  const app=$('#app');
  const hash=(location.hash||'#/').split('?')[0];
  const qs=new URLSearchParams((location.hash.split('?')[1]||''));
  let body='';
  if(hash==='#/'||hash==='#'||hash==='')body=viewHome();
  else if(hash==='#/catalogo'){FILT={q:qs.get('q')||'',cond:qs.get('cond')||'todos',marca:qs.get('marca')||'todas',tipo:'todas',max:99999999,shown:12};body=viewCatalogo();setTimeout(applyFilters,0)}
  else if(hash.startsWith('#/auto/'))body=viewPDP(hash.replace('#/auto/',''));
  else if(hash==='#/concesionarias')body=viewConcesionarias();
  else if(hash.startsWith('#/concesionaria/'))body=viewConcesionaria(hash.replace('#/concesionaria/',''));
  else if(hash==='#/cuenta'){ATAB=qs.get('t')||'resumen';body=viewCuenta()}
  else body=viewHome();
  app.innerHTML=header()+'<div class="fu">'+body+'</div>'+footer();
  window.scrollTo(0,0);
}

fetch('catalogo.json').then(r=>r.json()).then(data=>{

  window.addEventListener('hashchange',render);render();
}).catch(e=>{$('#app').innerHTML='<div class="loading">No se pudo cargar el catálogo. '+e+'</div>'});
