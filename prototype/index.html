<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plasencia Marketplace · La experiencia ideal</title>
<meta name="description" content="Marketplace de Grupo Plasencia Automotriz: compra, financia, arrienda, asegura y mantén tu auto. Catálogo real, una sola cuenta, una relación de cinco años.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1E2740; --navy-deep:#0F1A2E; --slate:#2D3748;
  --red:#C8102E; --red-deep:#A50D25; --gold:#ECC94B; --gold-deep:#B7791F;
  --blue:#4299E1; --blue-deep:#2B6CB0; --green:#48BB78; --green-deep:#276749; --amber:#D69E2E;
  --n50:#F7FAFC; --n100:#EDF2F7; --n200:#E2E8F0; --n300:#CBD5E0; --n400:#A0AEC0;
  --n500:#718096; --n600:#4A5568; --n700:#2D3748; --n800:#1A202C; --n900:#171923;
  --disp:'Montserrat',sans-serif; --body:'Inter',system-ui,sans-serif;
  --r-sm:6px; --r-md:10px; --r-lg:16px; --r-xl:22px;
  --sh-sm:0 1px 3px rgba(15,26,46,.08); --sh-md:0 4px 12px rgba(15,26,46,.08),0 2px 4px rgba(15,26,46,.06);
  --sh-lg:0 12px 32px rgba(15,26,46,.12); --sh-xl:0 24px 56px rgba(15,26,46,.20);
  --ease:cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--n100);color:var(--n800);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;line-height:1.5}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit}
h1,h2,h3,h4{font-family:var(--disp);letter-spacing:-.02em}
.tnum{font-variant-numeric:tabular-nums}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--n300);border-radius:99px}
@keyframes fadeup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fadeup{animation:fadeup .5s var(--ease) both}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skel{background:linear-gradient(90deg,var(--n200) 25%,var(--n100) 37%,var(--n200) 63%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ===== HEADER ===== */
.hdr{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--n200)}
.hdr-in{max-width:1240px;margin:0 auto;padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:30px;width:auto}
.logo .tag{font-family:var(--disp);font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;background:var(--red);color:#fff;padding:3px 7px;border-radius:5px}
.nav{display:flex;align-items:center;gap:4px}
.nav a{font-family:var(--disp);font-size:13px;font-weight:600;color:var(--n700);padding:8px 12px;border-radius:8px;transition:.2s}
.nav a:hover{background:var(--n100);color:var(--navy)}
.nav a.on{color:var(--red)}
.acct{font-family:var(--disp);font-size:13px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px;border:1px solid var(--n200);padding:8px 14px;border-radius:10px;transition:.2s}
.acct:hover{border-color:var(--navy);background:var(--n50)}
.acct .badge{background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:18px;height:18px;padding:0 5px;border-radius:99px;display:inline-flex;align-items:center;justify-content:center}
@media(max-width:760px){.nav{display:none}}

/* ===== BUTTONS ===== */
.btn{font-family:var(--disp);font-weight:700;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.2s;letter-spacing:-.01em}
.btn:active{transform:scale(.98)}
.btn-sm{font-size:13px;padding:8px 14px} .btn-md{font-size:14px;padding:11px 20px} .btn-lg{font-size:15px;padding:14px 26px}
.btn-primary{background:var(--navy);color:#fff} .btn-primary:hover{background:var(--slate)}
.btn-conv{background:var(--red);color:#fff;box-shadow:0 6px 16px rgba(200,16,46,.25)} .btn-conv:hover{background:var(--red-deep)}
.btn-out{border:1px solid var(--n300);color:var(--navy);background:#fff} .btn-out:hover{border-color:var(--navy);background:var(--n50)}
.btn-ghost{color:var(--navy)} .btn-ghost:hover{background:var(--n100)}
.btn-full{width:100%}
.btn[disabled]{opacity:.5;cursor:not-allowed}

/* ===== GENERIC ===== */
.wrap{max-width:1240px;margin:0 auto;padding:0 20px}
.eyebrow{font-family:var(--disp);font-size:11px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--red)}
.badge-pill{font-family:var(--disp);font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:99px;display:inline-flex;align-items:center;gap:4px}
.bp-gold{background:rgba(236,201,75,.2);color:var(--gold-deep)}
.bp-green{background:rgba(72,187,120,.15);color:var(--green-deep)}
.bp-navy{background:rgba(30,39,64,.08);color:var(--navy)}
.bp-red{background:rgba(200,16,46,.1);color:var(--red)}

/* ===== HERO ===== */
.hero{position:relative;overflow:hidden;background:var(--navy-deep);color:var(--n50)}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 85% 0%,rgba(236,201,75,.14),transparent 60%),radial-gradient(ellipse 60% 55% at 0% 100%,rgba(200,16,46,.16),transparent 55%)}
.hero-in{position:relative;max-width:1240px;margin:0 auto;padding:80px 20px 90px}
.hero h1{font-size:clamp(34px,6vw,66px);font-weight:900;line-height:1.02;max-width:880px}
.hero h1 .y{color:var(--gold)}
.hero p.sub{font-size:clamp(15px,2vw,18px);color:var(--n300);margin-top:22px;max-width:620px;line-height:1.6}
.searchbox{margin-top:34px;background:#fff;border-radius:16px;padding:8px;display:flex;gap:8px;max-width:640px;box-shadow:var(--sh-xl)}
.searchbox input{flex:1;border:none;outline:none;padding:14px 16px;font-size:15px;color:var(--navy);border-radius:10px}
.hero-trust{display:flex;flex-wrap:wrap;gap:10px 26px;margin-top:34px}
.hero-trust span{font-size:13px;color:var(--n300);display:flex;align-items:center;gap:7px}
.hero-trust b{color:var(--gold)}

/* ===== MARCAS STRIP ===== */
.marcas{background:#fff;border-bottom:1px solid var(--n200)}
.marcas-in{max-width:1240px;margin:0 auto;padding:18px 20px;display:flex;flex-wrap:wrap;gap:8px 26px;align-items:center;justify-content:center}
.marcas .lbl{font-family:var(--disp);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--n400)}
.marcas b{font-family:var(--disp);font-weight:800;color:var(--n600);font-size:14px}

/* ===== SECTIONS ===== */
.sec{padding:72px 0}
.sec h2{font-size:clamp(24px,4vw,38px);font-weight:800;color:var(--navy);max-width:680px}
.sol-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:36px}
@media(max-width:860px){.sol-grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.sol-grid{grid-template-columns:1fr}}
.sol{background:#fff;border:1px solid var(--n200);border-radius:16px;padding:24px;transition:.2s}
.sol:hover{box-shadow:var(--sh-md);border-color:var(--n300)}
.sol .ic{font-size:26px}
.sol h3{font-size:18px;font-weight:700;color:var(--navy);margin-top:12px}
.sol p{font-size:13px;color:var(--n600);margin-top:6px;line-height:1.55}

/* ===== VEHICLE GRID & CARD ===== */
.vgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:32px}
@media(max-width:1080px){.vgrid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:780px){.vgrid{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.vgrid{grid-template-columns:1fr}}
.vcard{background:#fff;border:1px solid var(--n200);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:.2s;cursor:pointer}
.vcard:hover{box-shadow:var(--sh-lg);transform:translateY(-2px);border-color:var(--n300)}
.vcard .ph{position:relative;aspect-ratio:16/10;background:var(--n100);overflow:hidden}
.vcard .ph img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease)}
.vcard:hover .ph img{transform:scale(1.05)}
.vcard .ph .ovl{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:6px;align-items:flex-start}
.vcard .body{padding:16px;display:flex;flex-direction:column;flex:1}
.vcard .mk{font-family:var(--disp);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--n600);display:flex;gap:6px;align-items:center}
.vcard .mk .yr{color:var(--n400);font-weight:600}
.vcard h3{font-size:16px;font-weight:700;color:var(--navy);margin-top:2px}
.vcard .specs{display:flex;flex-wrap:wrap;gap:4px 10px;margin-top:10px;font-size:11px;color:var(--n500)}
.vcard .foot{margin-top:auto;padding-top:14px;display:flex;align-items:flex-end;justify-content:space-between}
.vcard .price{font-family:var(--disp);font-weight:800;font-size:20px;color:var(--navy)}
.vcard .mens{font-size:11px;color:var(--n500)} .vcard .mens b{color:var(--green-deep);font-weight:700}
.vcard .suc{font-size:11px;color:var(--n400);text-align:right;max-width:92px;line-height:1.3}

/* ===== FILTERS ===== */
.filters{position:sticky;top:64px;z-index:30;background:rgba(237,242,247,.92);backdrop-filter:blur(6px);padding:16px 0;border-bottom:1px solid var(--n200)}
.filters-in{max-width:1240px;margin:0 auto;padding:0 20px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.filters input,.filters select{font-family:var(--disp);font-size:13px;font-weight:600;border:1px solid var(--n300);background:#fff;border-radius:99px;padding:9px 14px;outline:none;color:var(--navy);cursor:pointer}
.filters input{cursor:text;min-width:170px}
.filters input:focus,.filters select:focus{border-color:var(--navy)}
.filters .clear{font-family:var(--disp);font-size:12px;font-weight:700;color:var(--red);padding:8px}
.filters .count{margin-left:auto;font-size:13px;color:var(--n500)}

/* ===== PDP ===== */
.crumb{font-size:12px;color:var(--n500);display:flex;gap:8px;margin:20px 0}
.crumb a:hover{color:var(--navy)}
.pdp{display:grid;grid-template-columns:1.4fr 1fr;gap:32px;align-items:start}
@media(max-width:900px){.pdp{grid-template-columns:1fr}}
.gal-main{aspect-ratio:16/10;border-radius:16px;overflow:hidden;background:var(--n100)}
.gal-main img{width:100%;height:100%;object-fit:cover}
.gal-thumbs{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.gal-thumbs button{width:78px;height:54px;border-radius:8px;overflow:hidden;border:2px solid transparent;opacity:.65;transition:.2s}
.gal-thumbs button.on{border-color:var(--navy);opacity:1}
.gal-thumbs img{width:100%;height:100%;object-fit:cover}
.trust-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px;background:#fff;border:1px solid var(--n200);border-radius:16px;padding:18px}
.trust-row .t{font-size:13px;color:var(--n600);display:flex;align-items:center;gap:8px}
.trust-row .t b{color:var(--green-deep)}
.specs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--n200);border:1px solid var(--n200);border-radius:16px;overflow:hidden;margin-top:20px}
@media(max-width:560px){.specs-grid{grid-template-columns:1fr 1fr}}
.specs-grid .c{background:#fff;padding:14px}
.specs-grid .k{font-family:var(--disp);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--n500)}
.specs-grid .v{font-size:14px;font-weight:600;color:var(--navy);margin-top:2px}
/* cockpit */
.cockpit{background:#fff;border:1px solid var(--n200);border-radius:18px;padding:24px;box-shadow:var(--sh-md);position:sticky;top:84px}
.cockpit .mk{font-family:var(--disp);font-size:12px;font-weight:800;text-transform:uppercase;color:var(--n600);display:flex;gap:6px}
.cockpit h1{font-size:26px;font-weight:800;color:var(--navy);line-height:1.1;margin-top:2px}
.cockpit .price{font-family:var(--disp);font-weight:900;font-size:32px;color:var(--navy);margin-top:14px;padding-bottom:14px;border-bottom:1px solid var(--n200)}
.modtabs{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:var(--n100);padding:4px;border-radius:12px;margin-top:18px}
.modtabs button{font-family:var(--disp);font-size:12px;font-weight:700;padding:9px;border-radius:9px;color:var(--n500);transition:.2s}
.modtabs button.on{background:#fff;color:var(--navy);box-shadow:var(--sh-sm)}
.calc{margin-top:18px}
.calc .row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.calc .row b{color:var(--navy)}
.calc input[type=range]{width:100%;accent-color:var(--red)}
.plazos{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.plazos button{font-family:var(--disp);font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;border:1px solid var(--n300);color:var(--n600);transition:.2s}
.plazos button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.mensbox{background:var(--navy);color:#fff;border-radius:12px;padding:16px;text-align:center;margin-top:16px}
.mensbox .lbl{font-family:var(--disp);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--n300)}
.mensbox .v{font-family:var(--disp);font-weight:900;font-size:28px;color:var(--gold)}
.mensbox .sub{font-size:11px;color:var(--n400)}
.cta-stack{margin-top:18px;display:flex;flex-direction:column;gap:8px}
.cta-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;z-index:60;background:rgba(15,26,46,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:20px;padding:32px;max-width:440px;width:100%;text-align:center}
.modal .ok{width:56px;height:56px;border-radius:99px;background:rgba(72,187,120,.15);color:var(--green-deep);font-size:28px;display:flex;align-items:center;justify-content:center;margin:0 auto}
.modal h3{font-size:24px;font-weight:800;color:var(--navy);margin-top:16px}
.modal p{font-size:14px;color:var(--n600);margin-top:8px}
.modal .folio{background:var(--n100);border-radius:12px;padding:12px;margin-top:16px}
.modal .folio .k{font-family:var(--disp);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--n500)}
.modal .folio .v{font-family:var(--disp);font-weight:800;color:var(--navy)}

/* ===== ACCOUNT ===== */
.acct-tabs{display:flex;gap:2px;margin-top:24px;border-bottom:1px solid var(--n200);overflow-x:auto}
.acct-tabs button{font-family:var(--disp);font-size:13px;font-weight:700;white-space:nowrap;padding:12px 16px;border-bottom:2px solid transparent;color:var(--n500);transition:.2s}
.acct-tabs button.on{border-color:var(--red);color:var(--navy)}
.deal-card{background:#fff;border:1px solid var(--n200);border-radius:16px;padding:16px;display:flex;gap:16px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.deal-card img{width:120px;aspect-ratio:16/10;object-fit:cover;border-radius:12px}

/* ===== PLASI ===== */
.plasi-btn{position:fixed;bottom:20px;right:20px;z-index:50;background:var(--navy);color:#fff;display:flex;align-items:center;gap:10px;padding:12px 18px 12px 12px;border-radius:99px;box-shadow:var(--sh-xl);transition:.2s}
.plasi-btn:hover{background:var(--slate)}
.plasi-btn .av{width:32px;height:32px;border-radius:99px;background:var(--gold);color:var(--navy);font-family:var(--disp);font-weight:900;display:flex;align-items:center;justify-content:center}
.plasi-btn span{font-family:var(--disp);font-weight:700;font-size:14px}
.plasi-panel{position:fixed;bottom:20px;right:20px;z-index:50;width:min(380px,calc(100vw - 40px));height:min(560px,calc(100vh - 40px));background:#fff;border-radius:20px;box-shadow:var(--sh-xl);border:1px solid var(--n200);display:flex;flex-direction:column;overflow:hidden}
.plasi-hd{background:var(--navy);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px}
.plasi-hd .av{width:36px;height:36px;border-radius:99px;background:var(--gold);color:var(--navy);font-family:var(--disp);font-weight:900;display:flex;align-items:center;justify-content:center}
.plasi-hd .nm{font-family:var(--disp);font-weight:700;font-size:15px}
.plasi-hd .st{font-size:11px;color:var(--n300);display:flex;align-items:center;gap:6px}
.plasi-hd .st .dot{width:6px;height:6px;border-radius:99px;background:var(--green)}
.plasi-hd .x{margin-left:auto;color:var(--n400);font-size:22px;line-height:1}
.plasi-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--n50)}
.pmsg{max-width:82%;font-size:13px;line-height:1.5;padding:10px 14px;border-radius:16px}
.pmsg.bot{background:#fff;border:1px solid var(--n200);color:var(--n700);align-self:flex-start;border-bottom-left-radius:4px}
.pmsg.usr{background:var(--navy);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.psug{text-align:left;font-size:12.5px;color:var(--navy);background:#fff;border:1px solid var(--n200);border-radius:12px;padding:9px 12px;transition:.2s}
.psug:hover{border-color:var(--navy)}
.plasi-in{padding:12px;border-top:1px solid var(--n200);display:flex;gap:8px}
.plasi-in input{flex:1;font-size:13px;padding:10px 14px;background:var(--n100);border:none;border-radius:99px;outline:none}
.plasi-in button{width:40px;height:40px;border-radius:99px;background:var(--red);color:#fff;font-size:18px}

/* ===== FOOTER ===== */
.ftr{background:var(--navy-deep);color:var(--n300);margin-top:80px}
.ftr-in{max-width:1240px;margin:0 auto;padding:56px 20px}
.ftr-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:40px}
@media(max-width:780px){.ftr-grid{grid-template-columns:1fr 1fr}}
.ftr img{height:30px;mix-blend-mode:screen}
.ftr h4{font-family:var(--disp);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:12px}
.ftr ul{list-style:none} .ftr li{font-size:13px;color:var(--n400);padding:4px 0}
.ftr .bottom{border-top:1px solid rgba(255,255,255,.1);margin-top:40px;padding-top:24px;font-size:11px;color:var(--n500);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

/* loading */
.loading{text-align:center;padding:100px 20px;color:var(--n500)}
.empty{text-align:center;padding:80px 20px;color:var(--n500)}
.empty .ic{font-size:40px}
</style>
</head>
<body>
<div id="app"><div class="loading">Cargando Plasencia Marketplace…</div></div>

<button class="plasi-btn" id="plasiBtn" onclick="Plasi.open()">
  <span class="av">P</span><span>Pregúntale a Plasi</span>
</button>

<script>
//=================================================================
// Plasencia Marketplace · SPA vanilla (HTML/CSS/JS, sin build)
//=================================================================
const $ = (s,el=document)=>el.querySelector(s);
const mxn = n => new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0}).format(n||0);
const FALLBACK='data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250"><rect width="400" height="250" fill="#E2E8F0"/><text x="50%" y="50%" font-family="sans-serif" font-size="16" fill="#A0AEC0" text-anchor="middle" dy=".3em">Plasencia</text></svg>');

// ---- Estado persistente ----
const KEY='plasencia-mkt-v2';
let STATE = JSON.parse(localStorage.getItem(KEY) || 'null') || {customer:null, deals:[], pagos:[], servicios:[]};
const save = ()=>localStorage.setItem(KEY, JSON.stringify(STATE));

// ---- Finanzas ----
const TASA=0.135;
const mensCredito=(precio,engPct,plazo)=>{const cap=precio*(1-engPct/100);const i=TASA/12;return i===0?cap/plazo:cap*i/(1-Math.pow(1+i,-plazo));};
const rentaLease=(precio,plazo)=>{const f=plazo<=24?.032:plazo<=36?.026:.022;return precio*f*1.16;};
const folio=(marca)=>{const d=new Date();const p=x=>String(x).padStart(2,'0');return `GP-${marca.slice(0,3).toUpperCase()}-${String(d.getFullYear()%100)}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;};
const uid=p=>p+'-'+Math.random().toString(36).slice(2,8);

      <div class="ovl">
        ${v.dest?'<span class="badge-pill bp-gold">★ Destacado</span>':''}
        ${nuevo?'<span class="badge-pill bp-green">Nuevo · 0 km</span>':`<span class="badge-pill bp-navy">Seminuevo</span>`}
      </div>
    </div>
    <div class="body">

      <h3>${v.modelo}</h3>

      </div>
    </div>
  </article>`;
}

}
function applyFilters(){
  let r = CARS.filter(c=>{
    if(FILT.cond!=='todos'){const isN=c.km===0?'nuevo':'seminuevo';if(isN!==FILT.cond)return false;}
    if(FILT.marca!=='todas'&&c.marca!==FILT.marca)return false;
    if(FILT.tipo!=='todas'&&c.tipo!==FILT.tipo)return false;
    if(c.precio>FILT.max)return false;
    if(FILT.q){const h=(c.marca+' '+c.modelo+' '+c.tipo).toLowerCase();if(!h.includes(FILT.q.toLowerCase()))return false;}
    return true;
  });
  const grid=$('#vgrid'), cnt=$('#fcount'), lm=$('#loadmore');
  if(cnt)cnt.textContent=r.length+' resultados';
  if(!grid)return;
  if(r.length===0){grid.innerHTML='';lm.innerHTML='<div class="empty"><div class="ic">🔍</div><p>Sin resultados con esos filtros.</p></div>';return;}
  grid.innerHTML=r.slice(0,FILT.shown).map(vcard).join('');
  lm.innerHTML = FILT.shown<r.length ? `<button class="btn btn-out btn-lg" onclick="FILT.shown+=8;applyFilters()">Ver más vehículos (${r.length-FILT.shown} restantes)</button>` : '';
}
function setF(k,v){FILT[k]=v;FILT.shown=12;applyFilters();}

  STATE.deals.unshift({id:uid('deal'),folio:f,carId:id,modalidad:PDP.mod,estado:'apartado',apartado:5000,mensualidad:mens||null,plazo:PDP.mod!=='contado'?PDP.plazo:null,createdAt:Date.now()});

  save();updateBadge();

function renderAcctTab(){

const ESTLBL={apartado:['Apartado','bp-gold'],enganche:['Enganche pagado','bp-navy'],cerrado:['Comprado','bp-green'],cita:['Entrega agendada','bp-green']};
function acctCompras(){

function acctFin(){
  const fin=STATE.deals.filter(d=>d.modalidad!=='contado'&&d.mensualidad&&(d.estado==='enganche'||d.estado==='cita'||d.estado==='cerrado'));

  return fin.map(d=>{const v=CARS.find(c=>c.id===d.carId);const hechos=STATE.pagos.filter(p=>p.dealId===d.id).length;const total=d.mensualidad*d.plazo;const pagado=d.mensualidad*hechos;const pct=Math.round(hechos/d.plazo*100);const lease=d.modalidad==='arrendamiento';

      <div style="display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap">

      </div>
      <div style="margin-top:16px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:var(--n600)">${hechos} de ${d.plazo} pagos</span><b class="tnum">${pct}%</b></div><div style="height:8px;background:var(--n200);border-radius:99px;overflow:hidden"><div style="height:100%;background:var(--green);width:${pct}%;transition:.3s"></div></div></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px">
        ${[['Pagado',mxn(pagado)],['Saldo',mxn(total-pagado)],[lease?'Renta/mes':'Mensualidad',mxn(d.mensualidad)]].map(s=>`<div style="background:var(--n50);border-radius:10px;padding:12px"><div style="font-family:var(--disp);font-size:10px;font-weight:700;text-transform:uppercase;color:var(--n500)">${s[0]}</div><div style="font-family:var(--disp);font-weight:800;color:var(--navy);font-size:15px;margin-top:2px" class="tnum">${s[1]}</div></div>`).join('')}
      </div>
      ${hechos<d.plazo?`<div style="margin-top:16px;display:flex;justify-content:space-between;align-items:center;background:var(--navy);color:#fff;border-radius:12px;padding:14px"><div><div style="font-family:var(--disp);font-size:11px;font-weight:700;text-transform:uppercase;color:var(--gold)">Próximo pago</div><div style="font-family:var(--disp);font-weight:900;font-size:18px" class="tnum">${mxn(d.mensualidad)}</div></div><button class="btn btn-conv btn-sm" onclick="pagarMens('${d.id}')">Pagar ahora</button></div>`:`<div style="margin-top:16px;background:rgba(72,187,120,.1);color:var(--green-deep);border-radius:12px;padding:14px;text-align:center;font-weight:700;font-size:13px">✓ Plan liquidado. ¡Felicidades!</div>`}
    </div>`;}).join('');
}
function pagarMens(id){STATE.pagos.unshift({id:uid('pay'),dealId:id,fecha:'Hoy'});save();renderAcctTab();}
function acctPost(){
  const comprados=STATE.deals.filter(d=>d.estado==='cerrado'||d.estado==='cita'||d.estado==='enganche');
  const SERV=[['Servicio 10,000 km',3200],['Servicio mayor',6800],['Alineación y balanceo',1400],['Cambio de llantas',9500]];
  let html=`<div class="deal-card" style="display:block"><h3 style="font-size:17px;color:var(--navy)">Agendar servicio</h3><p style="font-size:13px;color:var(--n500);margin-bottom:14px">Tu auto, tu taller Plasencia, tu horario.</p>`;
  if(comprados.length===0)html+=`<p style="font-size:13px;color:var(--n500)">Compra un auto para agendar servicios.</p>`;
  else html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${SERV.map(s=>`<button class="btn btn-out btn-md" style="justify-content:space-between" onclick="agendarServ('${s[0]}',${s[1]})"><span>${s[0]}</span><span style="color:var(--n500);font-size:12px" class="tnum">${mxn(s[1])}</span></button>`).join('')}</div>`;
  html+=`</div>`;
  if(STATE.servicios.length)html+=`<h3 style="font-size:16px;color:var(--navy);margin:18px 0 12px">Historial de servicio</h3>`+STATE.servicios.map(s=>`<div class="deal-card"><span style="width:38px;height:38px;border-radius:99px;background:rgba(72,187,120,.15);display:flex;align-items:center;justify-content:center">🔧</span><div style="flex:1"><div style="font-family:var(--disp);font-weight:600;color:var(--navy);font-size:14px">${s.tipo}</div><div style="font-size:12px;color:var(--n500)">Próximo sábado 10:00</div></div><div class="tnum" style="font-weight:700;color:var(--navy)">${mxn(s.costo)}</div><span class="badge-pill bp-green">Agendado</span></div>`).join('');
  return html;
}
function agendarServ(tipo,costo){STATE.servicios.unshift({id:uid('srv'),tipo,costo});save();renderAcctTab();}
function acctRenov(){
  const comprados=STATE.deals.filter(d=>d.estado==='cerrado'||d.estado==='cita'||d.estado==='enganche');
  if(comprados.length===0)return `<div class="empty"><div class="ic">♻️</div><p>Cuando tengas un auto con nosotros, aquí verás tu oferta de recompra con trade-in pre-calculado.</p></div>`;
  const v=CARS.find(c=>c.id===comprados[0].carId);const oferta=Math.round(v.precio*0.62/1000)*1000;
  const sug=CARS.filter(c=>c.km===0&&c.tipo===v.tipo&&c.id!==v.id).slice(0,4);
  return `<div style="background:var(--navy);color:#fff;border-radius:18px;padding:28px;position:relative;overflow:hidden">
    <div style="position:relative"><div style="font-family:var(--disp);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--gold)">Tu oferta de renovación</div>
    <h3 style="font-size:24px;margin-top:6px">Tu ${v.marca} ${v.modelo} vale hasta</h3>
    <div style="font-family:var(--disp);font-weight:900;font-size:40px;color:var(--gold)" class="tnum">${mxn(oferta)}</div>
    <p style="font-size:14px;color:var(--n300);margin-top:8px;max-width:440px">Aplícalo como enganche de tu siguiente auto. El grupo conoce tu historial: renovar es más fácil que empezar de cero.</p></div></div>
    <h3 style="font-size:18px;color:var(--navy);margin:28px 0 16px">Tu siguiente Plasencia</h3><div class="vgrid">${sug.map(vcard).join('')}</div>`;
}
function acctPerfil(){
  const c=STATE.customer||{};
  return `<div style="max-width:600px"><div class="deal-card" style="display:block">
    <div style="display:flex;gap:16px;align-items:center;margin-bottom:18px"><div style="width:56px;height:56px;border-radius:99px;background:var(--navy);color:var(--gold);font-family:var(--disp);font-weight:900;font-size:20px;display:flex;align-items:center;justify-content:center">${(c.nombre||'C')[0].toUpperCase()}</div><div><h3 style="font-size:18px;color:var(--navy)">${c.nombre||'Tu perfil'}</h3>${c.preap?'<span class="badge-pill bp-green">Crédito pre-aprobado</span>':'<span class="badge-pill bp-gold">KYC pendiente</span>'}</div></div>
    ${[['nombre','Nombre completo'],['email','Correo'],['tel','Teléfono'],['rfc','RFC']].map(f=>`<div style="margin-bottom:10px"><label style="font-family:var(--disp);font-size:11px;font-weight:700;text-transform:uppercase;color:var(--n500)">${f[1]}</label><input id="pf_${f[0]}" value="${c[f[0]]||''}" style="width:100%;margin-top:4px;border:1px solid var(--n300);border-radius:10px;padding:10px 14px;font-size:14px;outline:none"></div>`).join('')}
    <button class="btn btn-conv btn-md" style="margin-top:8px" onclick="savePerfil()">Guardar cambios</button> <span id="pfsaved" style="font-size:13px;color:var(--green-deep);font-weight:700"></span>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--n100);font-size:12px;color:var(--n500)">🔒 Tus datos se gestionan bajo la política de privacidad de Grupo Plasencia. (Demo: guardado local.)</div>
  </div></div>`;
}
function savePerfil(){STATE.customer={...STATE.customer,nombre:$('#pf_nombre').value,email:$('#pf_email').value,tel:$('#pf_tel').value,rfc:$('#pf_rfc').value,kyc:!!$('#pf_nombre').value};save();$('#pfsaved').textContent='✓ Guardado';}

// ---- Modal ----
function showModal(html){const d=document.createElement('div');d.className='modal-bg';d.id='modalBg';d.onclick=e=>{if(e.target===d)closeModal()};d.innerHTML=`<div class="modal fadeup">${html}</div>`;document.body.appendChild(d);}
function closeModal(){const m=$('#modalBg');if(m)m.remove();}

// ---- Plasi ----
const Plasi={
  open(pre){this.render();if(pre)setTimeout(()=>this.send(pre),300);},
  close(){const p=$('#plasiPanel');if(p)p.remove();$('#plasiBtn').style.display='';},
  msgs:[{f:'bot',t:'¡Hola! Soy Plasi 👋 tu asistente en Plasencia Marketplace. ¿Te ayudo a encontrar tu próximo auto?'}],
  render(){
    $('#plasiBtn').style.display='none';
    let p=$('#plasiPanel');if(p)p.remove();
    p=document.createElement('div');p.className='plasi-panel fadeup';p.id='plasiPanel';
    const sug=['¿Cuál SUV me conviene para familia?','¿Cómo funciona el apartado?','¿Qué necesito para el crédito?','Diferencia entre comprar y arrendar'];
    p.innerHTML=`<div class="plasi-hd"><span class="av">P</span><div style="flex:1"><div class="nm">Plasi</div><div class="st"><span class="dot"></span>Asistente Plasencia · en línea</div></div><button class="x" onclick="Plasi.close()">×</button></div>
      <div class="plasi-msgs" id="pmsgs">${this.msgs.map(m=>`<div class="pmsg ${m.f}">${m.t}</div>`).join('')}${this.msgs.length<=1?'<div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">'+sug.map(s=>`<button class="psug" onclick="Plasi.send(this.textContent)">${s}</button>`).join('')+'</div>':''}</div>
      <div class="plasi-in"><input id="pinput" placeholder="Escribe tu pregunta…" onkeydown="if(event.key==='Enter'){Plasi.send(this.value);this.value=''}"><button onclick="var i=document.getElementById('pinput');Plasi.send(i.value);i.value=''">→</button></div>`;
    document.body.appendChild(p);
  },
  send(q){q=(q||'').trim();if(!q)return;this.msgs.push({f:'usr',t:q});this.renderMsgs();setTimeout(()=>{this.msgs.push({f:'bot',t:this.reply(q)});this.renderMsgs();},420);},
  renderMsgs(){const m=$('#pmsgs');if(!m)return;m.innerHTML=this.msgs.map(x=>`<div class="pmsg ${x.f}">${x.t}</div>`).join('');m.scrollTop=m.scrollHeight;},
  reply(q){const t=q.toLowerCase();
    if(t.includes('familia')||t.includes('suv'))return 'Para familia te recomiendo un SUV: tenemos Mazda CX-5, Hyundai Tucson, Jeep Compass y más, todos cross-marca en el catálogo. ¿Quieres que te muestre los SUV disponibles?';
    if(t.includes('apart'))return 'Apartas cualquier auto con $5,000 reembolsables desde su página. Reserva la unidad a tu nombre, fija el precio y agenda tu cita. Si no continúas, te devolvemos el depósito completo.';
    if(t.includes('crédito')||t.includes('credito')||t.includes('financ'))return 'Para el crédito Plasencia necesitas identificación, comprobante de domicilio e ingresos. Te pre-apruebas en línea sin afectar tu buró. Enganche típico 20%, plazos de 12 a 60 meses a 13.5% anual.';
    if(t.includes('arrend')||t.includes('lease'))return 'GP Autolease es arrendamiento puro: renta mensual fija, sin enganche fuerte, y al final renuevas, devuelves o compras. Ideal para empresas (deducible) y para quien renueva cada 2-3 años.';
    if(t.includes('valuar')||t.includes('mi auto'))return 'Con gusto valúo tu auto actual para que aplique como enganche. ¿De qué marca, modelo y año es? (En el prototipo la valuación es estimada.)';
    if(t.includes('seminuevo')||t.includes('usado'))return 'Nuestros seminuevos pasan 167 puntos de inspección, con garantía por escrito y devolución de 7 días. Cada uno muestra su historial.';
    return 'Te puedo ayudar con: elegir auto, cotizar crédito o arrendamiento, el apartado, seminuevos certificados o agendar tu cita. ¿Sobre cuál te cuento más?';
  }
};

// ---- Footer ----

  <div class="ftr-grid">
    <div><img src="logo-blanco.png" alt="Grupo Plasencia"><p style="font-size:13px;color:var(--n400);margin-top:14px;max-width:280px;line-height:1.6">La experiencia automotriz completa de Grupo Plasencia en un solo lugar: comprar, financiar, arrendar, asegurar y vivir tu auto.</p></div>
    <div><h4>Comprar</h4><ul><li>Autos nuevos</li><li>Seminuevos certificados</li><li>Comparar</li><li>Valuar mi auto</li></ul></div>
    <div><h4>Soluciones</h4><ul><li>Plasencia Crédito</li><li>GP Autolease</li><li>Plasencia Seguros</li><li>Postventa</li></ul></div>
    <div><h4>Grupo Plasencia</h4><ul><li>75 años</li><li>Multimarca</li><li>Sucursales</li><li>Contacto</li></ul></div>
  </div>
  <div class="bottom"><span>Grupo Plasencia Automotriz · Prototipo de producto · 2026</span><span style="color:var(--gold)">Marketplace · la experiencia ideal</span></div>
</div></footer>`;}

// ---- Header ----
function header(){
  const route=location.hash||'#/';
  const n=STATE.deals.length;
  const link=(h,l)=>`<a href="${h}" class="${route===h?'on':''}">${l}</a>`;
  return `<header class="hdr"><div class="hdr-in">
    <a href="#/" class="logo"><img src="logo-negro.png" alt="Grupo Plasencia"><span class="tag">Marketplace</span></a>
    <nav class="nav">${link('#/catalogo','Catálogo')}${link('#/catalogo?cond=nuevo','Nuevos')}${link('#/catalogo?cond=seminuevo','Seminuevos')}<a href="#/catalogo">Autolease</a></nav>
    <a href="#/cuenta" class="acct">◆ Mi Plasencia ${n>0?`<span class="badge">${n}</span>`:''}</a>
  </div></header>`;
}
function updateBadge(){const h=$('.hdr');if(h)h.outerHTML=header();}

//=================================================================
// ROUTER
//=================================================================
function go(hash){location.hash=hash;}
function render(){
  const app=$('#app');
  const hash=(location.hash||'#/').split('?')[0];
  const qs=new URLSearchParams((location.hash.split('?')[1]||''));
  let body='';
  if(hash==='#/'||hash==='#'||hash==='')body=viewHome();
  else if(hash==='#/catalogo'){FILT={q:'',cond:qs.get('cond')||'todos',marca:'todas',tipo:'todas',max:99999999,shown:12};body=viewCatalogo();setTimeout(applyFilters,0);}
  else if(hash.startsWith('#/auto/'))body=viewPDP(hash.replace('#/auto/',''));
  else if(hash==='#/cuenta')body=viewCuenta();
  else body=viewHome();
  app.innerHTML=header()+'<div class="fadeup">'+body+'</div>'+footer();
  window.scrollTo(0,0);
}

//=================================================================
// BOOT
//=================================================================
fetch('catalogo.json').then(r=>r.json()).then(data=>{
  CARS=data; MARCAS=[...new Set(data.map(c=>c.marca))].sort();
  window.addEventListener('hashchange',render);
  render();
}).catch(e=>{$('#app').innerHTML='<div class="loading">No se pudo cargar el catálogo. '+e+'</div>';});
window.go=go;window.setF=setF;window.setFoto=setFoto;window.setMod=setMod;window.apartar=apartar;window.closeModal=closeModal;window.pagarEnganche=pagarEnganche;window.agendar=agendar;window.pagarMens=pagarMens;window.agendarServ=agendarServ;window.savePerfil=savePerfil;window.renderAcctTab=renderAcctTab;window.Plasi=Plasi;window.FILT=FILT;window.PDP=PDP;
</script>
